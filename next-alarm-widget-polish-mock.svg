<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="0.58" stop-color="#eef1ed"/>
      <stop offset="1" stop-color="#dfe5df"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#166534"/>
      <stop offset="1" stop-color="#052e16"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="900" fill="#eef2f5"/>
  <text x="100" y="92" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="34" font-weight="800" fill="#111827">Next Alarm Widget 美化方向</text>
  <text x="100" y="134" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="22" fill="#475569">4x2：大時間、兩行完整內容、上方小標題，唔再逼到斷字</text>

  <!-- Main proposal -->
  <g transform="translate(110 210)">
    <rect x="0" y="0" width="650" height="330" rx="54" fill="url(#paper)" stroke="#cfd7cf" stroke-width="2" filter="url(#softShadow)"/>
    <rect x="42" y="42" width="62" height="62" rx="19" fill="url(#ink)"/>
    <g transform="translate(55 55)" stroke="#f8fafc" stroke-width="5" fill="none" stroke-linecap="round">
      <circle cx="18" cy="20" r="16"/>
      <path d="M18 10v12l9 8"/>
      <path d="M4 5c4-5 9-7 14-7"/>
      <path d="M32 5c-4-5-9-7-14-7"/>
    </g>
    <text x="126" y="83" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="25" font-weight="900" letter-spacing="3" fill="#4b5563">NEXT ALARM</text>
    <text x="325" y="202" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="128" font-weight="900" fill="#07111f">09:45</text>
    <text x="325" y="268" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="34" font-weight="800" fill="#111827">報平安更，報開</text>
    <text x="325" y="307" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="28" font-weight="700" fill="#374151">下一句內容可放第二行</text>
  </g>

  <text x="110" y="590" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="26" font-weight="800" fill="#111827">方案 A：紙感淺灰</text>
  <text x="110" y="630" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="21" fill="#475569">最似你而家張圖，但更乾淨。返工望一眼時間最清楚。</text>

  <!-- Dark accent option -->
  <g transform="translate(820 210)">
    <rect x="0" y="0" width="540" height="250" rx="48" fill="#111827" filter="url(#softShadow)"/>
    <rect x="20" y="20" width="500" height="210" rx="36" fill="#f3f4f6"/>
    <rect x="44" y="42" width="50" height="50" rx="16" fill="url(#green)"/>
    <text x="112" y="76" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="20" font-weight="900" letter-spacing="2" fill="#166534">NEXT ALARM</text>
    <text x="270" y="158" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="900" fill="#07111f">09:45</text>
    <text x="270" y="204" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="24" font-weight="800" fill="#111827">報平安更，報開</text>
    <text x="270" y="230" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="20" font-weight="700" fill="#374151">第二行完整內容</text>
  </g>

  <text x="820" y="510" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="26" font-weight="800" fill="#111827">方案 B：深色外框</text>
  <text x="820" y="550" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="21" fill="#475569">較醒目，但可能同桌布撞色。視覺上比較似工具 widget。</text>

  <!-- Compact option -->
  <g transform="translate(820 610)">
    <rect x="0" y="0" width="540" height="180" rx="42" fill="#e8ebe8" stroke="#cbd5d1" stroke-width="2" filter="url(#softShadow)"/>
    <text x="38" y="48" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="18" font-weight="900" letter-spacing="2" fill="#4b5563">NEXT ALARM</text>
    <text x="270" y="122" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="900" fill="#07111f">09:45</text>
    <text x="270" y="157" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="21" font-weight="800" fill="#111827">報平安更，報開 / 第二行內容</text>
  </g>

  <text x="110" y="720" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="24" font-weight="800" fill="#111827">我建議用方案 A</text>
  <text x="110" y="760" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="21" fill="#475569">原因：你要望一眼知道下一個 alarm，A 嘅時間最大，內容可兩行，icon 又唔搶位。</text>
</svg>
