<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f1e8"/>
      <stop offset="1" stop-color="#d8ded7"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="0.49" stop-color="#0f172a"/>
      <stop offset="0.51" stop-color="#090f1d"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="900" fill="#e7ebef"/>
  <text x="110" y="92" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="36" font-weight="900" fill="#111827">4x2 Next Alarm：翻頁鐘 / Station Board 版</text>
  <text x="110" y="136" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="22" fill="#475569">時間變成兩塊，視覺同而家完全唔同；底部留兩行完整內容。</text>

  <!-- Large preview -->
  <g transform="translate(150 210)">
    <rect x="0" y="0" width="780" height="390" rx="54" fill="url(#card)" stroke="#c6cec7" stroke-width="2" filter="url(#shadow)"/>
    <text x="52" y="68" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="24" font-weight="900" letter-spacing="4" fill="#334155">NEXT SHIFT ALARM</text>
    <text x="690" y="68" text-anchor="end" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="20" font-weight="800" fill="#64748b">門前直樹</text>

    <g transform="translate(80 105)">
      <rect x="0" y="0" width="250" height="150" rx="24" fill="url(#tile)"/>
      <line x1="14" y1="75" x2="236" y2="75" stroke="#475569" stroke-width="2" opacity="0.42"/>
      <circle cx="14" cy="75" r="5" fill="#d8ded7" opacity="0.9"/>
      <circle cx="236" cy="75" r="5" fill="#d8ded7" opacity="0.9"/>
      <text x="125" y="114" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="112" font-weight="900" fill="#f8fafc">09</text>
    </g>

    <text x="390" y="210" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="90" font-weight="900" fill="#111827">:</text>

    <g transform="translate(450 105)">
      <rect x="0" y="0" width="250" height="150" rx="24" fill="url(#tile)"/>
      <line x1="14" y1="75" x2="236" y2="75" stroke="#475569" stroke-width="2" opacity="0.42"/>
      <circle cx="14" cy="75" r="5" fill="#d8ded7" opacity="0.9"/>
      <circle cx="236" cy="75" r="5" fill="#d8ded7" opacity="0.9"/>
      <text x="125" y="114" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="112" font-weight="900" fill="#f8fafc">45</text>
    </g>

    <text x="390" y="312" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="34" font-weight="900" fill="#111827">報平安更，報開</text>
    <text x="390" y="352" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="28" font-weight="800" fill="#374151">第二行完整內容放呢度</text>
  </g>

  <!-- Actual 4x2-ish preview -->
  <g transform="translate(980 235)">
    <text x="0" y="0" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="26" font-weight="900" fill="#111827">手機實際 4x2 感覺</text>
    <rect x="0" y="40" width="410" height="230" rx="38" fill="url(#card)" stroke="#c6cec7" stroke-width="2" filter="url(#shadow)"/>
    <text x="28" y="78" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="14" font-weight="900" letter-spacing="2" fill="#334155">NEXT SHIFT</text>
    <g transform="translate(42 92)">
      <rect x="0" y="0" width="142" height="86" rx="16" fill="url(#tile)"/>
      <line x1="10" y1="43" x2="132" y2="43" stroke="#475569" stroke-width="1.2" opacity="0.5"/>
      <text x="71" y="66" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="900" fill="#f8fafc">09</text>
    </g>
    <text x="205" y="153" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="900" fill="#111827">:</text>
    <g transform="translate(226 92)">
      <rect x="0" y="0" width="142" height="86" rx="16" fill="url(#tile)"/>
      <line x1="10" y1="43" x2="132" y2="43" stroke="#475569" stroke-width="1.2" opacity="0.5"/>
      <text x="71" y="66" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="900" fill="#f8fafc">45</text>
    </g>
    <text x="205" y="203" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="17" font-weight="900" fill="#111827">報平安更，報開</text>
    <text x="205" y="226" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="15" font-weight="800" fill="#374151">第二行完整內容</text>
  </g>

  <g transform="translate(150 675)">
    <text x="0" y="0" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="26" font-weight="900" fill="#111827">落 app 時我會做嘅取捨</text>
    <text x="0" y="44" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="22" fill="#475569">1. Widget 用 RemoteViews，不能用真正自訂字體，所以會用系統 serif 模擬翻頁鐘數字。</text>
    <text x="0" y="84" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="22" fill="#475569">2. 內容固定兩行，字體細過而家，優先顯示完整行位內容。</text>
    <text x="0" y="124" font-family="Microsoft JhengHei, Noto Sans TC, sans-serif" font-size="22" fill="#475569">3. 移除大 icon，因為上次已證明 icon 會食位。</text>
  </g>
</svg>
